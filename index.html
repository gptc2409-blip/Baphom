<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BAPHOM | Member Archive</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">

<style>
body { font-family: 'Inter', sans-serif; }
.modal { display:none; position:fixed; inset:0; background:white; z-index:100; }
.modal.active { display:block; }
.cart-drawer { transition: transform .4s; }
</style>
</head>

<body class="bg-white text-black">

<!-- NAV -->
<nav class="flex justify-between p-6 border-b">
<h1 class="font-black">BAPHOM</h1>

<div>
<button id="userBtn">Account</button>
<button onclick="toggleCart()">Cart (<span id="cartCount">0</span>)</button>
</div>
</nav>

<!-- PRODUTOS -->
<div class="p-10 grid grid-cols-2 gap-6">
<button onclick="openProduct('Cyber Puffer',1450)">Cyber Puffer</button>
<button onclick="openProduct('Void Pants',920)">Void Pants</button>
</div>

<!-- MODAL LOGIN -->
<div id="authModal" class="modal flex items-center justify-center">
<div class="bg-white p-6">
<h2>Login</h2>
<input id="loginEmail" placeholder="email"><br>
<input id="loginPass" placeholder="senha" type="password"><br>
<button onclick="handleLogin()">Entrar</button>

<h2>Cadastro</h2>
<input id="regEmail" placeholder="email"><br>
<input id="regPass" placeholder="senha" type="password"><br>
<button onclick="handleRegister()">Criar conta</button>

<button onclick="toggleAuth()">Fechar</button>
</div>
</div>

<!-- CARRINHO -->
<div id="cartDrawer" class="fixed right-0 top-0 bg-white w-80 h-full translate-x-full cart-drawer p-6">
<h2>Carrinho</h2>
<div id="cartItems"></div>
<p>Total: € <span id="cartTotal">0</span></p>
<button onclick="checkoutWhatsApp()">Finalizar</button>
<button onclick="toggleCart()">Fechar</button>
</div>

<!-- FIREBASE + SISTEMA -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

// CONFIG FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyCfQR5oGS4oBAo8n2KHynFOxgUlnZvmwHM",
  authDomain: "baphom-d0d13.firebaseapp.com",
  projectId: "baphom-d0d13",
  storageBucket: "baphom-d0d13.firebasestorage.app",
  messagingSenderId: "404007926967",
  appId: "1:404007926967:web:64bf534913a0af153ba132"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// AUTH
window.handleRegister = async () => {
  const email = regEmail.value;
  const pass = regPass.value;
  await createUserWithEmailAndPassword(auth, email, pass);
  alert("Conta criada");
};

window.handleLogin = async () => {
  await signInWithEmailAndPassword(auth, loginEmail.value, loginPass.value);
  toggleAuth();
};

window.handleLogout = () => signOut(auth);

onAuthStateChanged(auth, (user) => {
  if (user) {
    userBtn.innerText = user.email;
    userBtn.onclick = handleLogout;
  } else {
    userBtn.innerText = "Account";
    userBtn.onclick = toggleAuth;
  }
});

// UI
window.toggleAuth = () => authModal.classList.toggle('active');
window.toggleCart = () => cartDrawer.classList.toggle('translate-x-full');

// CARRINHO
let cart = [];

window.openProduct = (name, price) => {
  cart.push({name, price});
  updateCart();
};

function updateCart(){
  cartItems.innerHTML="";
  let total=0;

  cart.forEach(i=>{
    total+=i.price;
    cartItems.innerHTML+=`<p>${i.name} - €${i.price}</p>`;
  });

  cartTotal.innerText=total;
  cartCount.innerText=cart.length;
}

// CHECKOUT
window.checkoutWhatsApp = () => {
  if(!auth.currentUser) return alert("Faça login");

  let msg="Pedido:%0A";
  cart.forEach(i=> msg+=`${i.name}%0A`);

  window.open(`https://wa.me/SEUNUMERO?text=${msg}`);
};
</script>

</body>
</html>
